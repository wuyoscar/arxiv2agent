name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - run: uv run ruff check src tests
      - run: uv run pytest -q

  # Golden-corpus regression + E2E. Downloads real arXiv sources on a cold
  # cache (politely spaced), then everything is offline. Kept out of the PR
  # matrix to avoid hammering arXiv from forks; runs on main + manual dispatch.
  corpus:
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/arxiv-to-prompt
          key: arxiv-corpus-${{ hashFiles('tests/corpus_lock.json') }}
      - run: uv sync --extra dev
      - run: uv run pytest -m corpus -q
      - run: uv run pytest -m e2e -q
